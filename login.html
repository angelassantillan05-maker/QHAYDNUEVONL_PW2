<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ¿Qué hay de nuevo, Nuevo León?</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <main class="login-wrapper">
        <div class="login-aside">
            <div class="aside-content">
                <h1>¿QUÉ HAY DE NUEVO,<br><span>NUEVO LEÓN?</span></h1>
            </div>
        </div>

        <div class="login-section">
            <div class="login-box">
                <div class="brand-logo">
                    <i class="fas fa-futbol"></i>
                </div>

                <div class="login-header">
                    <h2>¡Bienvenido!</h2>
                </div>

                <form class="login-form">
                    <div class="input-group">
                        <label for="email"><i class="fas fa-user"></i> Email</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-login">Iniciar sesión</button>
                </form>

                <div class="social-divider">
                    <span>O continúa con</span>
                </div>

                <div class="social-login">
                    <button class="btn-social google">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"> Google
                    </button>
                    <button class="btn-social apple">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
